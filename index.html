```html
<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nedräkning tills du kommer hem ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Dancing+Script:wght@500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
font-family:'Poppins',sans-serif;

background: linear-gradient(180deg,#0f2027,#203a43,#2c5364);
color:white;
overflow:hidden;
}

/* Snow background */

body:before{
content:"";
position:absolute;
width:100%;
height:100%;
background-image:
radial-gradient(white 2px, transparent 2px),
radial-gradient(white 1px, transparent 1px),
radial-gradient(white 1.5px, transparent 1.5px);
background-size:200px 200px,150px 150px,250px 250px;
background-position:0 0,40px 60px,130px 270px;
opacity:0.25;
}

.container{
position:relative;
z-index:2;
max-width:600px;
padding:40px;
border-radius:20px;
backdrop-filter:blur(10px);
background:rgba(255,255,255,0.08);
box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

h1{
font-family:'Dancing Script',cursive;
font-size:3.5rem;
margin-bottom:10px;
}

.subtitle{
font-size:1.1rem;
opacity:0.9;
margin-bottom:25px;
}

#timer{
font-size:2rem;
font-weight:500;
margin-top:10px;
}

.heart{
font-size:30px;
margin-top:20px;
animation:pulse 1.8s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.2);}
100%{transform:scale(1);}
}

.footer{
margin-top:30px;
font-size:0.9rem;
opacity:0.8;
}

</style>
</head>

<body>

<div class="container">

<h1>Jag saknar dig ❄️</h1>

<div class="subtitle">
Medan du åker skidor i bergen  
räknar jag varje sekund tills du är hemma igen.
</div>

<div id="timer"></div>

<div class="heart">❤️</div>

<div class="footer">
Åk försiktigt min älskling ⛷️  
Jag längtar efter dig.
</div>

</div>

<script>

const targetDate = new Date("2026-03-14T16:35:00").getTime();

const timer = setInterval(function(){

const now = new Date().getTime();
const distance = targetDate - now;

const dagar = Math.floor(distance / (1000 * 60 * 60 * 24));
const timmar = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
const minuter = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
const sekunder = Math.floor((distance % (1000 * 60)) / 1000);

document.getElementById("timer").innerHTML =
dagar + " dagar " +
timmar + " timmar " +
minuter + " minuter " +
sekunder + " sekunder";

if(distance < 0){
clearInterval(timer);
document.getElementById("timer").innerHTML = "Du är hemma! ❤️";
}

},1000);

</script>

</body>
</html>
```
