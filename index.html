```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown Until You’re Home ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    font-family:'Poppins', sans-serif;

    background: linear-gradient(180deg,#0f2027,#203a43,#2c5364);
    color:white;
}

/* Snow background */

body:before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background-image:
        radial-gradient(white 2px, transparent 2px),
        radial-gradient(white 1px, transparent 1px),
        radial-gradient(white 1.5px, transparent 1.5px);
    background-size: 200px 200px,150px 150px,250px 250px;
    background-position: 0 0, 40px 60px,130px 270px;
    opacity:0.25;
}

.container{
    position:relative;
    z-index:2;
    max-width:600px;
    padding:40px;
    border-radius:20px;
    backdrop-filter: blur(10px);
    background:rgba(255,255,255,0.08);
    box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

h1{
    font-family:'Great Vibes', cursive;
    font-size:3.5rem;
    margin-bottom:10px;
}

.subtitle{
    font-size:1.1rem;
    opacity:0.85;
    margin-bottom:30px;
}

.heart{
    font-size:30px;
    margin-top:20px;
    animation: pulse 1.8s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.2);}
    100%{transform:scale(1);}
}

#timerbox{
    margin-top:20px;
    font-size:24px;
}

.footer{
    margin-top:30px;
    font-size:0.9rem;
    opacity:0.7;
}

</style>
</head>

<body>

<div class="container">

<h1>I Miss You ❄️</h1>

<div class="subtitle">
The mountains may have you right now…  
but I’m counting every second until you’re home.
</div>

<div id="timerbox"></div>

<div class="heart">❤️</div>

<div class="footer">
Safe skiing my love ⛷️  
Can't wait to see you.
</div>

</div>

<script type="text/javascript" src="http://www.raknatid.se/ner/yourtimer.js"></script>
<script type="text/javascript">
setTimer(2026,2,14,16,35,'Min skat kommer hjem','000000','FFFFFF','large');
</script>

</body>
</html>
